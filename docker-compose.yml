version: '3.8'

services:
  nextjs_app:
    container_name: skl_app
    build: .
    restart: always
    volumes:
      # PENTING: Supaya upload TTD & CAP tidak hilang!
      - ./public/tte:/app/public/tte
    environment:
      - DATABASE_URL=mongodb://mongo_db:27017/skl_db
      - NEXT_PUBLIC_SCHOOL_NAME=SMAN 1 MARGAASIH

  nginx_satpam:
    container_name: skl_proxy
    image: nginx:alpine
    ports:
      - "4300:80" # Akses web Adik lewat port 4300!
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public/antrian.html:/usr/share/nginx/html/antrian.html:ro
    depends_on:
      - nextjs_app

  # Jika Adik ingin database ikut di dalam docker
  mongo_db:
    container_name: skl_db
    image: mongo:latest
    restart: always
    volumes:
      - ./mongo_data:/data/db