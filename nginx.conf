events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Setting zona BATASAN (Hanya satu kali di sini)
    limit_conn_zone $binary_remote_addr zone=limit_per_ip_conn:10m;
    limit_req_zone  $binary_remote_addr zone=limit_per_ip_req:10m rate=10r/s;

    server {
        listen 80;

        # 1. Lokasi Khusus Halaman Antrian
        location = /antrian.html {
            root /usr/share/nginx/html;
            allow all;
        }

        # 2. Lokasi Utama Aplikasi
        location / {
            # Terapkan Batasan
            limit_conn limit_per_ip_conn 20;
            limit_req zone=limit_per_ip_req burst=5 nodelay;

            # Proxy ke Next.js (Gunakan nama service skl_app sesuai docker-compose)
            proxy_pass http://skl_app:3000; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Jika server penuh (503), arahkan ke halaman antrian
            error_page 503 /antrian.html;
        }
    }
}