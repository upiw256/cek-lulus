events {
    worker_connections 2048; # Kakak naikkan jadi 2048 agar lebih kuat menampung antrean
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Setting Zona Batasan
    limit_conn_zone $binary_remote_addr zone=limit_per_ip_conn:10m;
    # Rate 20r/s sudah bagus, artinya 1 detik bisa melayani 20 request dari 1 orang
    limit_req_zone  $binary_remote_addr zone=limit_per_ip_req:10m rate=20r/s;

    server {
        listen 80;

        # POS 1: Halaman Antrian (Harus bisa diakses semua orang)
        location = /antrian.html {
            root /usr/share/nginx/html;
            allow all;
        }

        # POS 2: Aplikasi Utama (Siswa)
        location / {
            limit_conn limit_per_ip_conn 50;        # Naikkan sedikit limit koneksi per IP
            limit_req zone=limit_per_ip_req burst=100 nodelay; # Sesuai permintaan Adik (100 burst)

            proxy_pass http://skl_app:3000; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Menangkap error limit_req (503) dan limit_conn (503) untuk dialihkan ke kura-kura
            error_page 503 =200 /antrian.html; 
        }

        # POS 3: Jalur Khusus Admin & Login (Tanpa Antrean)
        location /admin {
            proxy_pass http://skl_app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Di sini TIDAK ada limit_req, jadi Adik aman masuk terus
        }

        location /login {
            proxy_pass http://skl_app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Login sengaja tidak dilimit agar guru-guru/admin tetap bisa masuk
        }
    }
}