events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 1. Setting zona BATASAN (Penting: harus ada limit_req_zone agar bisa panggil limit_req)
    limit_conn_zone $binary_remote_addr zone=limit_per_ip_conn:10m;
    limit_req_zone  $binary_remote_addr zone=limit_per_ip_req:10m rate=10r/s;

    server {
        listen 80;

        # Halaman antrian (HTML) ditaruh di sini agar bisa diakses saat kena limit
        location = /antrian.html {
            root /usr/share/nginx/html;
        }

        location / {
            # 2. TERAPKAN BATASAN
            # Maksimal 20 koneksi bersamaan
            limit_conn limit_per_ip_conn 20;
            # Kecepatan request: 10 per detik, dengan bonus antrian (burst) 5
            limit_req zone=limit_per_ip_req burst=5 nodelay;

            # 3. SETTING PROXY (Pastikan nama host sesuai dengan di docker-compose.yml)
            proxy_pass http://skl_app:3000; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Jika server sibuk (503), lempar ke halaman antrian
            error_page 503 /antrian.html;
        }

        # Lokasi internal untuk menangani error 503 secara rapi
        error_page 503 /antrian.html;
        location = /antrian.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}